# Workspace members: every directory under packages/ is a package; e2e is its
# own package (the 21-item E2B compatibility suite, driven by both CI and the web UI)
packages:
  - packages/*
  - e2e

# Supply-chain defense: a newly published npm version must be at least 24 hours
# (1440 minutes) old before it can be installed — poisoned releases are usually
# found and unpublished within hours, so waiting a day avoids most incidents
minimumReleaseAge: 1440

# Build-script allowlist: dependencies may not run install scripts by default.
# Approve one by one, each line stating why the script is needed.
onlyBuiltDependencies:
  - esbuild # tsup's underlying bundler; postinstall downloads the platform binary
  - better-sqlite3 # native SQLite module; install script downloads a prebuilt binary (compiles locally if none matches)
