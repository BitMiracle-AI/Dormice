# 工作区成员：packages/ 下每个目录是一个包；e2e 独立成包（21 项 E2B 兼容套件，CI 与 WebUI 同源调用）
packages:
  - packages/*
  - e2e

# 供应链防御：新发布的 npm 包须满 24 小时（1440 分钟）才可安装——
# 恶意包投毒通常在发布后数小时内被发现下架，等一天避开绝大多数事故
minimumReleaseAge: 1440

# 构建脚本白名单：依赖默认禁止执行安装脚本，逐个批准（每行写明它为什么需要跑脚本）
onlyBuiltDependencies:
  - esbuild # tsup 的底层打包器，postinstall 下载对应平台的二进制
