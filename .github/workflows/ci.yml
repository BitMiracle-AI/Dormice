name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A superseded run on the same branch is dead weight — cancel it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    # The whole chain takes ~2 minutes; hanging longer means something is
    # stuck, so fail honestly instead of burning the 6-hour default.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      # Reads the pnpm version from package.json's packageManager field —
      # one place to bump, local and CI can never drift.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          # engines promises >=22, so CI runs that floor: anything needing
          # a newer Node fails here before it reaches a user.
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The same acceptance chain as local development, in the same order.
      # Build comes first: the e2e suite boots the built daemon.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  # This is a public repository: a leaked credential anywhere in git history
  # is an incident, and history is append-only — the only place to stop a
  # secret is before it lands. This job scans every commit on every push.
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          # The whole history, not just the tip: old commits leak too.
          fetch-depth: 0
      # The plain binary instead of gitleaks-action: same scan, no
      # organization license key required.
      - run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks git --no-banner --redact .
