name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A superseded run on the same branch is dead weight — cancel it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege for the workflow token: these jobs only read the repo.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    # The whole chain takes ~2 minutes; hanging longer means something is
    # stuck, so fail honestly instead of burning the 6-hour default.
    timeout-minutes: 10
    steps:
      # Third-party actions are pinned to commit SHAs, not tags: a tag can
      # be repointed at attacker code after the fact, the same reason the
      # gitleaks binary below is pinned by checksum.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # Reads the pnpm version from package.json's packageManager field —
      # one place to bump, local and CI can never drift.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          # engines promises >=22, so CI runs that floor: anything needing
          # a newer Node fails here before it reaches a user.
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The same acceptance chain as local development, in the same order.
      # Build comes first: the e2e suite boots the built daemon.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      # The installer is the one shell script users pipe into bash — it gets
      # the same static gate the TypeScript gets from Biome.
      - run: shellcheck deploy/install.sh
      - run: pnpm test

  # This is a public repository: a leaked credential anywhere in git history
  # is an incident, and history is append-only — the only place to stop a
  # secret is before it lands. This job scans every commit on every push.
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # The whole history, not just the tip: old commits leak too.
          fetch-depth: 0
      # The plain binary instead of gitleaks-action: same scan, no
      # organization license key required. The checksum is pinned like every
      # other downloaded binary in this repo — a poisoned release fails the
      # job instead of scanning our history with attacker code.
      - run: |
          curl -sSfL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks git --no-banner --redact .
